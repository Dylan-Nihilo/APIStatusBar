name: APIStatusBar
options:
  bundleIdPrefix: com.dylan
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  APIStatusBar:
    type: application
    platform: macOS
    sources:
      - path: APIStatusBar
    info:
      path: APIStatusBar/Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "© 2026 Dylan"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylan.apistatusbar
        PRODUCT_NAME: APIStatusBar
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_STRICT_CONCURRENCY: complete
  APIStatusBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: APIStatusBarTests
    dependencies:
      - target: APIStatusBar
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/APIStatusBar.app/Contents/MacOS/APIStatusBar
        SWIFT_VERSION: "6.0"
schemes:
  APIStatusBar:
    build:
      targets:
        APIStatusBar: all
        APIStatusBarTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - APIStatusBarTests
    archive:
      config: Release
